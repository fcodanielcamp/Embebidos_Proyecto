services:
  mqtt_broker:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/config/mosquitto.passwd:/mosquitto/config/mosquitto.passwd:ro
      - ./mosquitto/data:/mosquitto/data
    restart: always

  nodered:
    image: nodered/node-red:latest
    container_name: node_red_orquestador
    user: "root" # Necesario para tener permisos de instalación de npm
    depends_on:
      - mqtt_broker
    ports:
      - "1880:1880"
    volumes:
      - ./node_red_data:/data
    restart: always
    command: >
      bash -c "npm install node-red-contrib-re-postgres && 
      node-red-pi --userDir /data"

  hmi_python:
    build: ./hmi_area
    container_name: hmi_interface
    network_mode: host
    volumes:
      - ./hmi_area:/app
    depends_on:
      - mqtt_broker
    restart: always